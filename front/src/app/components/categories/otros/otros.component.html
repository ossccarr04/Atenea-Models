<br>
<div>
    <div id="accesorios" class="categoria">
        <h2>Diseño Propio</h2>
        <p class="texto-explicativo text-center mb-3">
            El diseño propio tiene un coste de {{precioTotal}} €.
        </p>

        <label for="email">Correo Electrónico</label>
        <input type="email" (change)="onEmailChange($event)"
          placeholder="Ingresa tu correo" class="form-control" required />

        <input type="file" accept="image/png, image/jpeg, image/jpg"
            (change)="onFileSelected($event)" />

        <div *ngIf="imagePreview">
            <h3>Vista previa:</h3>
            <img [src]="imagePreview" alt="Vista previa del diseño"
                width="200" />
        </div>

        <button (click)="onSendEmail()"
            [disabled]="!selectedFile || !userEmail">Enviar</button>
    </div>

    
</div>

<div *ngIf="showPopup" class="popup-overlay show">
        <div class="popup-backdrop"></div>
        <div class="popup-content">
            <app-factura
                [codigo]="codigoCamiseta"
                [precio]="precioTotal">
            </app-factura>
            <button (click)="closePopup()"
                class="btn btn-secondary mt-3">Cerrar</button>
        </div>
    </div>
