<div class="camiseta-container container mt-4">
  <h1 class="fw-bold text-center">Camisetas</h1>

  <p class="texto-explicativo text-center mb-3"
    *ngIf="firstLoad==false; else firstLoadTemplate">
    Cada parte modificada tiene un coste adicional de {{precio}} €.
  </p>

  <ng-template #firstLoadTemplate>
    <p class="texto-explicativo text-center mb-3">
      Selecciona las opciones de tu camiseta actual.
    </p>
  </ng-template>

  <div class="row align-items-center">
    <!-- Imagen a la izquierda (más grande) -->
    <div class="col-md-6">
      <div class="text-center">
        <img [src]="imagenCamiseta" alt="Camiseta seleccionada"
          class="camiseta-imagen img-fluid mb-2" />

        <!-- Precio total integrado debajo -->
        <div class="precio-total-box mt-2 d-inline-block" *ngIf="!firstLoad">
          <span class="fw-bold">Precio Total: </span>
          <span class="fs-5">{{ precioTotal | number:'1.2-2' }} €</span>
        </div>
      </div>
    </div>

    <!-- Opciones y formulario a la derecha -->
    <div class="col-md-6">
      <div class="opciones-grid">
        <div class="opcion-item">
          <app-entallado [(modelo)]="entallado"
            (modeloChange)="onCambioDeOpciones(); updatePrecio('entallado',$event);">
          </app-entallado>
        </div>

        <div class="opcion-item">
          <app-manga [(modelo)]="manga"
            (modeloChange)="onCambioDeOpciones(); updatePrecio('manga',$event);">
          </app-manga>
        </div>

        <div class="opcion-item">
          <app-cuello [(modelo)]="cuello"
            (modeloChange)="onCambioDeOpciones(); updatePrecio('cuello',$event);">
          </app-cuello>
        </div>

        <div class="opcion-item">
          <app-largo [(modelo)]="largo"
            (modeloChange)="onCambioDeOpciones(); updatePrecio('largo',$event);">
          </app-largo>
        </div>

        <div class="opcion-item">
          <app-decoracion [(modelo)]="decoracion"
            (modeloChange)="onCambioDeOpciones(); updatePrecio('decoracion',$event);">
          </app-decoracion>
        </div>

        <div class="opcion-item" *ngIf="!firstLoad">
          <app-sexo [(modelo)]="sexo"></app-sexo>
        </div>

        <div class="opcion-item" *ngIf="!firstLoad">
          <app-contorno-medidas [(modelo)]="contorno_medidas"
            [sexo]="sexo">
          </app-contorno-medidas>
        </div>

        <div class="opcion-item" *ngIf="!firstLoad">
          <app-largo-medidas [(modelo)]="largo_medidas"
            [sexo]="sexo">
          </app-largo-medidas>
        </div>
      </div>

      <div class="sugerencias-container mt-3" *ngIf="!firstLoad">
        <label for="sugerencias" class="form-label"><strong>Sugerencias o comentarios:</strong></label>
        <textarea id="sugerencias"
          [(ngModel)]="sugerencias"
          rows="4"
          placeholder="Escribe tus sugerencias aquí..."
          class="form-control">
        </textarea>
      </div>
      <!-- Campo de correo y botón de enviar -->
      <div class="email-container"
        *ngIf="firstLoad==false; else AcceptTemplate">
        <label for="email">Correo Electrónico</label>
        <input type="email" (change)="onEmailChange($event)"
          placeholder="Ingresa tu correo" class="form-control" required />
        <button (click)="onSendEmail()"
          [disabled]="!userEmail || !imagenExiste || !userEmail.includes('@')"
          class="btn btn-primary">
          Enviar
        </button>
      </div>

      <ng-template #AcceptTemplate>
        <div>
          <div class="email-container">
            <button (click)="acceptDesign()"
              class="btn btn-primary">
              Aceptar diseño
            </button>
          </div>
        </div>
      </ng-template>

    </div>
  </div>
</div>

<div *ngIf="showPopup" class="popup-overlay show">
  <div class="popup-backdrop"></div>
  <div class="popup-content">
    <app-factura
      [codigo]="codigoCamiseta"
      [entallado]="entallado"
      [manga]="manga"
      [cuello]="cuello"
      [largo]="largo"
      [precio]="precioTotal"
      [decoracion]="decoracion"
      [sexo]="sexo"
      [contorno_medidas]="contorno_medidas"
      [largo_medidas]="largo_medidas"
      [sugerencias]="sugerencias">
    </app-factura>
    <button (click)="closePopup()"
      class="btn btn-secondary mt-3">Cerrar</button>
  </div>
</div>
