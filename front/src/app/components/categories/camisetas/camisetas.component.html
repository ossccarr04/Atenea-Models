<div class="camiseta-container container mt-4">
  <h1 class="fw-bold text-center">Camisetas</h1>

  <div class="tipo-prenda-toggle text-center my-3">
    <button
      class="btn-toggle"
      [ngClass]="{'active': tipoPrenda === 'camisetas'}"
      (click)="onTipoPrendaChange('camisetas')">
      Camisetas
    </button>
    <button
      class="btn-toggle"
      [ngClass]="{'active': tipoPrenda === 'tops'}"
      (click)="onTipoPrendaChange('tops')">
      Tops
    </button>
  </div>
  <p class="texto-explicativo text-center mb-3"
    *ngIf="firstLoad==false; else firstLoadTemplate">
    Cada parte modificada tiene un coste adicional de {{precio}} €.
  </p>

  <ng-template #firstLoadTemplate>
    <p class="texto-explicativo text-center mb-3">
      Selecciona las opciones de tu camiseta actual.
    </p>
  </ng-template>

  <div class="row align-items-center">
    <!-- Imagen a la izquierda (más grande) -->
    <div class="col-md-6">
      <div class="text-center">
        <img [src]="imagenCamiseta" alt="Camiseta seleccionada"
          class="camiseta-imagen img-fluid mb-2" />

        <!-- Precio total integrado debajo -->
        <div class="precio-total-box mt-2 d-inline-block" *ngIf="!firstLoad">
          <span class="fw-bold">Precio Total: </span>
          <span class="fs-5">{{ precioTotal | number:'1.2-2' }} €</span>
        </div>
      </div>
    </div>

    <!-- Opciones y formulario a la derecha -->
    <div class="col-md-6">
      <div class="opciones-container">

        <app-entallado [(modelo)]="entallado"
          (modeloChange)="onCambioDeOpciones(); updatePrecio('entallado',$event);"></app-entallado>

        <app-manga [(modelo)]="manga"
          (modeloChange)="onCambioDeOpciones(); updatePrecio('manga',$event);"></app-manga>

        <app-cuello [(modelo)]="cuello"
          (modeloChange)="onCambioDeOpciones(); updatePrecio('cuello',$event);"></app-cuello>

        <app-largo [(modelo)]="largo"
          (modeloChange)="onCambioDeOpciones(); updatePrecio('largo',$event);"></app-largo>

        <app-decoracion [(modelo)]="decoracion"
          (modeloChange)="onCambioDeOpciones(); updatePrecio('decoracion',$event);"></app-decoracion>

      </div>

      <!-- Campo de correo y botón de enviar -->
      <div class="email-container"
        *ngIf="firstLoad==false; else AcceptTemplate">
        <label for="email">Correo Electrónico</label>
        <input type="email" (change)="onEmailChange($event)"
          placeholder="Ingresa tu correo" class="form-control" required />
        <button (click)="onSendEmail()"
          [disabled]="!userEmail || !imagenExiste || !userEmail.includes('@')"
          class="btn btn-primary">
          Enviar
        </button>
      </div>

      <ng-template #AcceptTemplate>
      <div >
        <div class="email-container">
          <button (click)="acceptDesign()"
            class="btn btn-primary">
            Aceptar diseño
          </button>
        </div>
      </div>
      </ng-template>
      

    </div>
  </div>
</div>

<div *ngIf="showPopup" class="popup-overlay show">
  <div class="popup-backdrop"></div>
  <div class="popup-content">
    <app-factura
      [codigo]="codigoCamiseta"
      [entallado]="entallado"
      [manga]="manga"
      [cuello]="cuello"
      [largo]="largo"
      [precio]="precioTotal">
    </app-factura>
    <button (click)="closePopup()"
      class="btn btn-secondary mt-3">Cerrar</button>
  </div>
</div>
